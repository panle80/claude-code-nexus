<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Claude Code Nexus — 基于 Claude Code CLI 的 Web 聊天界面，支持流式对话、Markdown 渲染、多用户隔离" />
    <meta name="theme-color" content="#141413" />
    <meta property="og:title" content="Claude Code Nexus" />
    <meta property="og:description" content="基于 Claude Code CLI 的 Web 聊天界面" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/claude-logo-light.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/claude-icon.svg" />
    <link rel="apple-touch-icon" href="/claude-logo-light.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Claude Code Nexus</title>
    <script>
      (function() {
        var stored = localStorage.getItem('claude-web-ide-theme');
        if (stored === 'light' || (!stored && window.matchMedia('(prefers-color-scheme: light)').matches)) {
          document.documentElement.classList.add('light');
        }
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
          document.documentElement.classList.add('touch-device');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
