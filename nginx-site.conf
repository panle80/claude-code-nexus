# Claude Code Nexus — 只含 server 块，用于 /etc/nginx/sites-enabled/

limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ISP 封锁 80/443，仅监听 8443
server {
    listen 8443 ssl http2;
    server_name claude.panle80.cn;

    ssl_certificate     /etc/nginx/ssl/claude.panle80.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/claude.panle80.cn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none';" always;

    client_max_body_size 10m;

    access_log /var/log/nginx/claude-access.log;
    error_log  /var/log/nginx/claude-error.log;

    location / {
        root /home/panle/web/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location /api/ {
        proxy_pass http://[::1]:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;

        # Auth endpoints — rate limit (child inherits parent proxy_pass/headers)
        location /api/auth/ {
            proxy_pass http://[::1]:3001;
            limit_req zone=auth burst=3 nodelay;
        }

        # Chat endpoint — stricter rate limit
        location /api/chat {
            proxy_pass http://[::1]:3001;
            limit_req zone=chat burst=2 nodelay;
        }
    }
}
